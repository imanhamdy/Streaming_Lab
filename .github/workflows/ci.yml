name: CI — Lint & Validate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  compose-validate:
    name: Docker Compose — syntax validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Docker Compose v2
        run: docker compose version

      - name: Create dummy .env for validation
        run: cp docker/.env.example docker/.env

      - name: Validate — databases
        run: docker compose -f docker/databases/docker-compose.yml config --quiet

      - name: Validate — monitoring
        run: docker compose -f docker/monitoring/docker-compose.yml config --quiet

      - name: Validate — storage
        run: docker compose -f docker/storage/docker-compose.yml config --quiet

      - name: Validate — proxy
        run: docker compose -f docker/proxy/docker-compose.yml config --quiet

      - name: Validate — keycloak
        run: docker compose -f docker/keycloak/docker-compose.yml config --quiet

      - name: Validate — security (vault)
        run: docker compose -f docker/security/docker-compose.yml config --quiet

      - name: Validate — jellyfin
        run: docker compose -f docker/jellyfin/docker-compose.yml config --quiet

  yaml-lint:
    name: YAML — lint all compose files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint compose files
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 120}}}" \
            docker/databases/docker-compose.yml \
            docker/monitoring/docker-compose.yml \
            docker/storage/docker-compose.yml \
            docker/proxy/docker-compose.yml \
            docker/keycloak/docker-compose.yml \
            docker/security/docker-compose.yml \
            docker/jellyfin/docker-compose.yml

  secret-scan:
    name: Secret detection — no credentials in git
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
