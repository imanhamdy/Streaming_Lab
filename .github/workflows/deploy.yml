name: CD - Deploy to vm-streaming

on:
  pull_request:
    branches: [develop, main]
    types: [closed]

jobs:
  deploy:
    name: Deploy - docker compose up
    runs-on: self-hosted
    if: github.event.pull_request.merged == true

    steps:
      - name: Pull latest code
        run: |
          cd ${{ secrets.DEPLOY_PATH }}
          git fetch origin
          git reset --hard origin/${{ github.base_ref }}

      - name: Recreate Docker networks
        run: |
          for net in streaming-net db-net monitoring-net; do
            docker network rm $net 2>/dev/null || true
          done
          docker network create streaming-net
          docker network create db-net
          docker network create monitoring-net

      - name: Deploy - databases
        run: docker compose -f ${{ secrets.DEPLOY_PATH }}/docker/databases/docker-compose.yml up -d --remove-orphans

      - name: Deploy - proxy
        run: docker compose -f ${{ secrets.DEPLOY_PATH }}/docker/proxy/docker-compose.yml up -d --remove-orphans

      - name: Deploy - keycloak
        run: docker compose -f ${{ secrets.DEPLOY_PATH }}/docker/keycloak/docker-compose.yml up -d --remove-orphans

      - name: Deploy - vault
        run: docker compose -f ${{ secrets.DEPLOY_PATH }}/docker/security/docker-compose.yml up -d --remove-orphans

      - name: Deploy - storage
        run: docker compose -f ${{ secrets.DEPLOY_PATH }}/docker/storage/docker-compose.yml up -d --remove-orphans

      - name: Deploy - jellyfin
        run: docker compose -f ${{ secrets.DEPLOY_PATH }}/docker/jellyfin/docker-compose.yml up -d --remove-orphans

      - name: Deploy - monitoring
        run: docker compose -f ${{ secrets.DEPLOY_PATH }}/docker/monitoring/docker-compose.yml up -d --remove-orphans

      - name: Health check
        run: |
          sleep 15
          docker ps --format "table {{.Names}}\t{{.Status}}"
          FAILED=$(docker ps --filter "status=exited" --format "{{.Names}}" | grep -v "^$" || true)
          if [ -n "$FAILED" ]; then
            for c in $FAILED; do docker logs --tail 20 "$c"; done
            exit 1
          fi
          echo "All containers UP"
