name: Security Scan - Trivy

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  trivy-scan:
    name: Trivy - Docker image vulnerability scan
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: jellyfin/jellyfin:latest
            name: jellyfin
          - image: traefik:v3.0
            name: traefik
          - image: quay.io/keycloak/keycloak:24.0.5
            name: keycloak
          - image: hashicorp/vault:1.17
            name: vault
          - image: postgres:15-alpine
            name: postgres
          - image: mongo:6.0
            name: mongodb
          - image: redis:7-alpine
            name: redis
          - image: minio/minio:latest
            name: minio
          - image: grafana/grafana:latest
            name: grafana
          - image: prom/prometheus:latest
            name: prometheus
          - image: grafana/loki:latest
            name: loki
          - image: containrrr/watchtower:latest
            name: watchtower

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull image - ${{ matrix.name }}
        run: docker pull ${{ matrix.image }}

      - name: Run Trivy - ${{ matrix.name }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          format: json
          exit-code: "0"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          output: trivy-${{ matrix.name }}.json

      - name: Upload Trivy report - ${{ matrix.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.json
          retention-days: 30

  push-to-trivyhub:
    name: Push reports to TrivyHub
    runs-on: self-hosted
    needs: trivy-scan
    if: always()

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: jellyfin
          - name: traefik
          - name: keycloak
          - name: vault
          - name: postgres
          - name: mongodb
          - name: redis
          - name: minio
          - name: grafana
          - name: prometheus
          - name: loki
          - name: watchtower

    steps:
      - name: Download Trivy report - ${{ matrix.name }}
        uses: actions/download-artifact@v4
        with:
          name: trivy-report-${{ matrix.name }}

      - name: Push to TrivyHub - ${{ matrix.name }}
        run: |
          curl -X POST \
            -H "Authorization: ApiKey ${{ secrets.TRIVYHUB_TOKEN }}" \
            -F "project=${{ github.repository }}" \
            -F "file=@trivy-${{ matrix.name }}.json" \
            -F "environment=production" \
            -F "branch=${{ github.ref_name }}" \
            -F "commit=${{ github.sha }}" \
            http://192.168.10.2:3001/api/v1/report

  trivy-summary:
    name: Trivy - Summary gate
    runs-on: ubuntu-latest
    needs: push-to-trivyhub
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "Trivy scan complete. Reports available in artifacts and TrivyHub."
          echo "Severity scanned: CRITICAL,HIGH (ignore-unfixed: true)"
          echo "Exit-code: 0 - scan is informational, does not block merge."
