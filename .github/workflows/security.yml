name: Security Scan — Trivy

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  trivy-scan:
    name: Trivy — Docker image vulnerability scan
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: jellyfin/jellyfin:latest
            name: jellyfin
          - image: traefik:v3.0
            name: traefik
          - image: quay.io/keycloak/keycloak:24
            name: keycloak
          - image: hashicorp/vault:1.17
            name: vault
          - image: postgres:15-alpine
            name: postgres
          - image: mongo:6.0
            name: mongodb
          - image: redis:7-alpine
            name: redis
          - image: minio/minio:latest
            name: minio
          - image: grafana/grafana:latest
            name: grafana
          - image: prom/prometheus:latest
            name: prometheus
          - image: grafana/loki:latest
            name: loki
          - image: containrrr/watchtower:latest
            name: watchtower

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull image — ${{ matrix.name }}
        run: docker pull ${{ matrix.image }}

      - name: Run Trivy — ${{ matrix.name }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: "CRITICAL"
          output: trivy-${{ matrix.name }}.txt

      - name: Upload Trivy report — ${{ matrix.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.txt
          retention-days: 30

  trivy-summary:
    name: Trivy — Summary gate
    runs-on: ubuntu-latest
    needs: trivy-scan
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "ℹ️  Trivy scan complete. Reports available in artifacts."
          echo "Severity scanned: CRITICAL only (ignore-unfixed: true)"
          echo "Exit-code: 0 — scan is informational, does not block merge."
          echo "Review artifacts to track CVEs over time."
