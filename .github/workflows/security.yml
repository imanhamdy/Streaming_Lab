name: Security Scan - Trivy

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  trivy-scan:
    name: Trivy - Docker image vulnerability scan
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: jellyfin/jellyfin:10.10.7
            name: jellyfin
          - image: traefik:v3.4.1
            name: traefik
          - image: quay.io/keycloak/keycloak:26.2.5
            name: keycloak
          - image: hashicorp/vault:1.19.3
            name: vault
          - image: postgres:17-alpine
            name: postgres
          - image: mongo:8.0.10
            name: mongodb
          - image: redis:7-alpine
            name: redis
          - image: minio/minio:RELEASE.2025-06-13T11-33-47Z
            name: minio
          - image: grafana/grafana:11.6.1
            name: grafana
          - image: prom/prometheus:v3.4.1
            name: prometheus
          - image: grafana/loki:3.4.3
            name: loki
          - image: containrrr/watchtower:1.7.1
            name: watchtower

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Pull image - ${{ matrix.name }}
        run: docker pull ${{ matrix.image }}

      - name: Run Trivy - ${{ matrix.name }}
        run: |
          trivy image \
            --format json \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --output trivy-${{ matrix.name }}.json \
            ${{ matrix.image }}

      - name: Upload Trivy report - ${{ matrix.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.json
          retention-days: 30

  push-to-trivyhub:
    name: Push reports to TrivyHub
    runs-on: self-hosted
    needs: trivy-scan
    if: always()

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: jellyfin
          - name: traefik
          - name: keycloak
          - name: vault
          - name: postgres
          - name: mongodb
          - name: redis
          - name: minio
          - name: grafana
          - name: prometheus
          - name: loki
          - name: watchtower

    steps:
      - name: Download Trivy report - ${{ matrix.name }}
        uses: actions/download-artifact@v4
        with:
          name: trivy-report-${{ matrix.name }}

      - name: Push to TrivyHub - ${{ matrix.name }}
        run: |
          curl -X POST \
            -H "Authorization: ApiKey ${{ secrets.TRIVYHUB_TOKEN }}" \
            -F "project=${{ github.repository }}" \
            -F "file=@trivy-${{ matrix.name }}.json" \
            -F "environment=production" \
            -F "branch=${{ github.ref_name }}" \
            -F "commit=${{ github.sha }}" \
            http://192.168.10.2:3001/api/v1/report

  trivy-summary:
    name: Trivy - Summary gate
    runs-on: ubuntu-latest
    needs: push-to-trivyhub
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "Trivy scan complete. Reports available in artifacts and TrivyHub."
          echo "Severity scanned: CRITICAL,HIGH (ignore-unfixed: true)"
          echo "Exit-code: 0 - scan is informational, does not block merge."
