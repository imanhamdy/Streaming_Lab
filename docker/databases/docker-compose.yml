networks:
  streaming-private:
    external: true
    name: streaming-private

volumes:
  postgres01_data:
  postgres02_data:
  etcd_data:

services:

  # ── ETCD (DCS for Patroni) ─────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: etcd
    restart: unless-stopped
    command: etcd
    environment:
      - ETCD_NAME=etcd0
      - ETCD_DATA_DIR=/etcd-data
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=etcd0=http://etcd:2380
      - ETCD_INITIAL_CLUSTER_TOKEN=streaming-postgres-cluster
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCDCTL_API=3
    volumes:
      - etcd_data:/etcd-data
    networks:
      - streaming-private
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── POSTGRES PRIMARY (patroni node 1) ──────────────────────
  postgres-01:
    build:
      context: ./patroni
    image: streaming-patroni:17
    container_name: postgres-01
    restart: unless-stopped
    env_file: ../../.env
    environment:
      # Node identity — Patroni reads these natively
      - PATRONI_NAME=postgres-01
      - PATRONI_RESTAPI_LISTEN=0.0.0.0:8008
      - PATRONI_RESTAPI_CONNECT_ADDRESS=postgres-01:8008
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=postgres-01:5432
      - PATRONI_POSTGRESQL_DATA_DIR=/data/patroni
      - PATRONI_POSTGRESQL_PGPASS=/tmp/pgpass0
      # Credentials from .env via env_file
      - PATRONI_SUPERUSER_USERNAME=${POSTGRES_USER}
      - PATRONI_SUPERUSER_PASSWORD=${POSTGRES_PASSWORD}
      - PATRONI_REPLICATION_USERNAME=replicator
      - PATRONI_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - postgres01_data:/data/patroni
    networks:
      - streaming-private
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── POSTGRES REPLICA (patroni node 2) ──────────────────────
  postgres-02:
    build:
      context: ./patroni
    image: streaming-patroni:17
    container_name: postgres-02
    restart: unless-stopped
    env_file: ../../.env
    environment:
      - PATRONI_NAME=postgres-02
      - PATRONI_RESTAPI_LISTEN=0.0.0.0:8008
      - PATRONI_RESTAPI_CONNECT_ADDRESS=postgres-02:8008
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=postgres-02:5432
      - PATRONI_POSTGRESQL_DATA_DIR=/data/patroni
      - PATRONI_POSTGRESQL_PGPASS=/tmp/pgpass0
      - PATRONI_SUPERUSER_USERNAME=${POSTGRES_USER}
      - PATRONI_SUPERUSER_PASSWORD=${POSTGRES_PASSWORD}
      - PATRONI_REPLICATION_USERNAME=replicator
      - PATRONI_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - postgres02_data:/data/patroni
    networks:
      - streaming-private
    depends_on:
      etcd:
        condition: service_healthy
      postgres-01:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── HAPROXY (postgres router) ──────────────────────────────
  haproxy-postgres:
    image: haproxy:2.9-alpine
    container_name: haproxy-postgres
    restart: unless-stopped
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5000:5000"
      - "5001:5001"
      - "7000:7000"
    networks:
      - streaming-private
    depends_on:
      - postgres-01
      - postgres-02
