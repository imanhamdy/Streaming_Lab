global
    maxconn 100
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    retries 2
    timeout client  30m
    timeout connect 4s
    timeout server  30m
    timeout check   5s

# Stats UI on port 7000
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 10s

# Write traffic → primary only
# Patroni REST API returns 200 on /master when this node is primary
listen postgres_primary
    bind *:5000
    option httpchk GET /master
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server postgres-01 postgres-01:5432 maxconn 100 check port 8008
    server postgres-02 postgres-02:5432 maxconn 100 check port 8008

# Read traffic → replicas
# Patroni REST API returns 200 on /replica when this node is a healthy replica
listen postgres_replica
    bind *:5001
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server postgres-01 postgres-01:5432 maxconn 100 check port 8008
    server postgres-02 postgres-02:5432 maxconn 100 check port 8008
