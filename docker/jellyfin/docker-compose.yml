networks:
  streaming-public:
    external: true
    name: streaming-public
  streaming-private:
    external: true
    name: streaming-private

services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    restart: unless-stopped
    hostname: jellyfin
    ports:
      - "8096:8096/tcp"
      - "7359:7359/udp"
    volumes:
      - /home/principal/jellyfin/config:/config
      - /home/principal/jellyfin/cache:/cache
      - /home/principal/media:/media:ro
    environment:
      - JELLYFIN_PublishedServerUrl=https://jellyfin.duoowatch.com
    extra_hosts:
      - host.docker.internal:host-gateway
    labels:
      - traefik.enable=true
      - traefik.docker.network=streaming-public
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.duoowatch.com`)
      - traefik.http.routers.jellyfin.entrypoints=web
      - traefik.http.routers.jellyfin.service=jellyfin
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
    networks:
      - streaming-public
      - streaming-private
