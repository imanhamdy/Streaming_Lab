global:
  resolve_timeout: 5m
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alertes@example.com'
  # smtp_auth_username: 'votre@gmail.com'
  # smtp_auth_password: 'app-password'
  # smtp_require_tls: true

route:
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default"

receivers:
  - name: "default"
    # email_configs:
    #   - to: 'votre@email.com'
    #     subject: '[ALERTE] {{ .GroupLabels.alertname }}'
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
