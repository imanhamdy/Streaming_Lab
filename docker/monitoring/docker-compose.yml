# =============================================================
#  docker/monitoring/docker-compose.yml
#  Stack monitoring — vm-streaming (192.168.10.2)
# =============================================================

networks:
  streaming-public:
    external: true
    name: streaming-public
  streaming-monitoring:
    external: true
    name: streaming-monitoring
  streaming-private:
    external: true
    name: streaming-private

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  trivyhub_data:

services:

  # ── PROMETHEUS ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    networks:
      - streaming-monitoring
      - streaming-private
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── LOKI ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    networks:
      - streaming-monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PROMTAIL ──────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/log/suricata:/var/log/suricata:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log/journal:/var/log/journal:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - streaming-monitoring

  # ── NODE EXPORTER ─────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  # ── CADVISOR ──────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    ports:
      - "8080:8080"
    networks:
      - streaming-monitoring

  # ── ALERTMANAGER ──────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - alertmanager_data:/alertmanager
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks:
      - streaming-monitoring

  # ── TRIVYHUB ──────────────────────────────────────────────
  trivyhub:
    image: ghcr.io/trivyhub/trivy-dashboard-web:latest
    container_name: trivyhub
    restart: unless-stopped
    environment:
      - JWT_SECRET=${TRIVYHUB_JWT_SECRET}
    volumes:
      - trivyhub_data:/app/data
    ports:
      - "3001:3000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=streaming-public
      - traefik.http.routers.trivyhub.rule=Host(`trivyhub.duoowatch.com`)
      - traefik.http.routers.trivyhub.entrypoints=web
      - traefik.http.services.trivyhub.loadbalancer.server.port=3000
    networks:
      - streaming-public
      - streaming-monitoring

  # ── GRAFANA ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    env_file: ../../.env
    environment:
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.duoowatch.com
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP=true
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Keycloak
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=grafana
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid email profile roles
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://keycloak.duoowatch.com/realms/streaming-lab/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=http://keycloak:8080/realms/streaming-lab/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=http://keycloak:8080/realms/streaming-lab/protocol/openid-connect/userinfo
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(roles[*], 'admin') && 'Admin' || 'Viewer'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    labels:
      - traefik.enable=true
      - traefik.docker.network=streaming-public
      - traefik.http.routers.grafana.rule=Host(`grafana.duoowatch.com`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    networks:
      - streaming-public
      - streaming-monitoring

  # ── POSTGRES EXPORTER ─────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    env_file: ../../.env
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@haproxy-postgres:5000/postgres?sslmode=disable
      - PG_EXPORTER_AUTO_DISCOVER_DATABASES=true
      - PG_EXPORTER_EXCLUDE_DATABASES=template0,template1
    networks:
      - streaming-monitoring
      - streaming-private

