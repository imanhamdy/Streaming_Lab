events {}
http {
    upstream docker_sock {
        server unix:/var/run/docker.sock;
    }
    server {
        listen 2375;
        # Strip /v1.24/ prefix — Docker 28+ rejects anything below 1.40
        location ~ ^/v[0-9.]+/(.*)$ {
            rewrite ^/v[0-9.]+/(.*)$ /$1 break;
            proxy_pass http://docker_sock;
            proxy_read_timeout 3600;
        }
        location / {
            proxy_pass http://docker_sock;
            proxy_read_timeout 3600;
        }
    }
}
