networks:
  streaming-public:
    external: true
    name: streaming-public
  streaming-private:
    external: true
    name: streaming-private

volumes:
  vault_data:
  crowdsec_data:
  crowdsec_db:

services:
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/linux
      - GID=1000
    volumes:
      - /var/log:/var/log/host:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - crowdsec_data:/etc/crowdsec
      - crowdsec_db:/var/lib/crowdsec/data
    networks:
      - streaming-public

  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    restart: unless-stopped
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=https://vault.duoowatch.com
    cap_add:
      - IPC_LOCK
    command: server
    volumes:
      - vault_data:/vault/data
      - ./vault-config.hcl:/vault/config/vault.hcl:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=streaming-public"
      - "traefik.http.routers.vault.rule=Host(`vault.duoowatch.com`)"
      - "traefik.http.routers.vault.entrypoints=web"
      - "traefik.http.services.vault.loadbalancer.server.port=8200"
    ports:
      - "8200:8200"
    networks:
      - streaming-public
      - streaming-private
