name: storage

networks:
  streaming-public:
    external: true
    name: streaming-public
  streaming-private:
    external: true
    name: streaming-private

volumes:
  minio_data:

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    restart: unless-stopped
    env_file: ../../.env
    environment:
      - MINIO_SERVER_URL=http://minio:9000
      - MINIO_BROWSER_REDIRECT_URL=https://minio.duoowatch.com
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=streaming-public

      - traefik.http.routers.minio-console.rule=Host(`minio.duoowatch.com`)
      - traefik.http.routers.minio-console.entrypoints=web
      - traefik.http.routers.minio-console.service=minio-console
      - traefik.http.services.minio-console.loadbalancer.server.port=9001

      - traefik.http.routers.minio-api.rule=Host(`minio-api.duoowatch.com`)
      - traefik.http.routers.minio-api.entrypoints=web
      - traefik.http.routers.minio-api.service=minio-api
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
    networks:
      - streaming-public
      - streaming-private
