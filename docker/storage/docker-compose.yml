networks:
  storage-net:
    external: true
    name: storage-net
  streaming-net:
    external: true
    name: streaming-net

volumes:
  minio_data:

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    env_file: ../../.env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`minio.duoowatch.com`)"
      - "traefik.http.routers.minio.entrypoints=web"
      - "traefik.http.services.minio.loadbalancer.server.port=9001"
    networks:
      - storage-net
      - streaming-net
