  <rect x="650" y="442" width="14" height="14" rx="2" fill="#0d1521" stroke="#1f6feb" stroke-width="1"/>
  <text x="672" y="454" fill="#8b949e" font-size="10">vm-streaming</text>

  <rect x="650" y="466" width="14" height="14" rx="2" fill="#0d1f12" stroke="#238636" stroke-width="1"/>
  <text x="672" y="478" fill="#8b949e" font-size="10">streaming-net</text>

  <rect x="650" y="490" width="14" height="14" rx="2" fill="#131520" stroke="#6e40c9" stroke-width="1"/>
  <text x="672" y="502" fill="#8b949e" font-size="10">db-net</text>

  <rect x="650" y="514" width="14" height="14" rx="2" fill="#0f1a1a" stroke="#39d353" stroke-width="1"/>
  <text x="672" y="526" fill="#8b949e" font-size="10">monitoring-net</text>

  <rect x="650" y="538" width="14" height="14" rx="2" fill="#1a180d" stroke="#d29922" stroke-width="1"/>
  <text x="672" y="550" fill="#8b949e" font-size="10">storage-net</text>

  <!-- STARTUP ORDER -->
  <rect x="636" y="610" width="214" height="130" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="743" y="630" fill="#e6edf3" font-size="11" font-weight="bold" text-anchor="middle">Démarrage</text>

  <circle cx="660" cy="652" r="10" fill="#238636"/>
  <text x="660" y="657" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">3</text>
  <text x="678" y="657" fill="#8b949e" font-size="10">VMs Proxmox</text>

  <circle cx="660" cy="678" r="10" fill="#388bfd"/>
  <text x="660" y="683" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">1</text>
  <text x="678" y="683" fill="#8b949e" font-size="10">Serveur physique</text>

  <circle cx="660" cy="704" r="10" fill="#a371f7"/>
  <text x="660" y="709" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">7</text>
  <text x="678" y="709" fill="#8b949e" font-size="10">Stacks Docker</text>

  <circle cx="660" cy="730" r="10" fill="#d29922"/>
  <text x="660" y="735" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">4</text>
  <text x="678" y="735" fill="#8b949e" font-size="10">Docker networks</text>

  <!-- Footer -->
