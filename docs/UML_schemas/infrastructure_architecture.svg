  <text x="133" y="697" fill="#8b949e" font-size="9" text-anchor="middle">Dashboards</text>

  <rect x="204" y="662" width="118" height="52" rx="5" fill="#1c2128" stroke="#39d353" stroke-width="1"/>
  <text x="263" y="682" fill="#e6edf3" font-size="10.5" font-weight="bold" text-anchor="middle">Prometheus</text>
  <text x="263" y="697" fill="#8b949e" font-size="9" text-anchor="middle">Metrics</text>

  <rect x="334" y="662" width="118" height="52" rx="5" fill="#1c2128" stroke="#39d353" stroke-width="1"/>
  <text x="393" y="682" fill="#e6edf3" font-size="10.5" font-weight="bold" text-anchor="middle">Loki</text>
  <text x="393" y="697" fill="#8b949e" font-size="9" text-anchor="middle">Logs</text>

  <rect x="464" y="662" width="118" height="52" rx="5" fill="#1c2128" stroke="#39d353" stroke-width="1"/>
  <text x="523" y="682" fill="#e6edf3" font-size="10.5" font-weight="bold" text-anchor="middle">Suricata</text>
  <text x="523" y="697" fill="#8b949e" font-size="9" text-anchor="middle">IDS</text>

  <text x="74" y="756" fill="#8b949e" font-size="9" font-style="italic">scrape targets: tous les containers · alerting via Grafana</text>

  <!-- storage-net -->
  <rect x="66" y="778" width="528" height="88" rx="6" fill="#1a180d" stroke="#d29922" stroke-width="1"/>
