<svg viewBox="0 0 900 1020" xmlns="http://www.w3.org/2000/svg" role="img" font-family="monospace, sans-serif">
  <title>Streaming Lab — Architecture d'Infrastructure</title>
  <desc>Full infrastructure diagram from internet/users down through Proxmox VMs and Docker networks</desc>

  <!-- Background -->
  <rect width="900" height="1020" fill="#0d1117"/>

  <!-- Header -->
  <text x="30" y="28" fill="#8b949e" font-size="11">Ynov Campus B3 INFRA</text>
  <text x="450" y="28" fill="#e6edf3" font-size="14" font-weight="bold" text-anchor="middle">Streaming Lab — Architecture d'Infrastructure</text>
  <text x="870" y="28" fill="#8b949e" font-size="11" text-anchor="end">Usage pédagogique</text>

  <!-- INTERNET -->
  <rect x="220" y="44" width="460" height="46" rx="6" fill="#21262d" stroke="#444c56" stroke-width="1.5"/>
  <text x="450" y="63" fill="#e6edf3" font-size="12" font-weight="bold" text-anchor="middle">Internet / utilisateurs</text>
  <text x="450" y="80" fill="#8b949e" font-size="10" text-anchor="middle">Cloudflare Tunnel · FortiGate VPN · MFA</text>

  <line x1="450" y1="90" x2="450" y2="106" stroke="#444c56" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FORTIGATE -->
  <rect x="160" y="106" width="580" height="46" rx="6" fill="#2d1f1f" stroke="#f85149" stroke-width="1.5"/>
  <text x="450" y="126" fill="#f85149" font-size="12" font-weight="bold" text-anchor="middle">FortiGate HA — 192.168.1.20</text>
  <text x="450" y="142" fill="#8b949e" font-size="10" text-anchor="middle">Firewall · ACLs · VPN SSL · Zero Trust NAC</text>

  <line x1="450" y1="152" x2="450" y2="168" stroke="#444c56" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SWITCH -->
  <rect x="100" y="168" width="700" height="46" rx="6" fill="#1a2535" stroke="#388bfd" stroke-width="1.5"/>
  <text x="450" y="188" fill="#58a6ff" font-size="12" font-weight="bold" text-anchor="middle">Cisco Catalyst C3650 — NIT-SW-1 — 192.168.90.2</text>
  <text x="450" y="204" fill="#8b949e" font-size="10" text-anchor="middle">VLANs : 10 · 20 · 90 · 110 · 120 · 130 · 140</text>

  <line x1="450" y1="214" x2="450" y2="230" stroke="#444c56" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PROXMOX OUTER BOX -->
  <rect x="30" y="230" width="840" height="730" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="450" y="252" fill="#e6edf3" font-size="12" font-weight="bold" text-anchor="middle">Proxmox VE 8 — DELL T140 — 192.168.90.50</text>

  <!-- vm-dns -->
  <rect x="50" y="264" width="180" height="56" rx="6" fill="#1c2128" stroke="#6e7681" stroke-width="1"/>
  <text x="140" y="284" fill="#e6edf3" font-size="11" font-weight="bold" text-anchor="middle">vm-dns</text>
  <text x="140" y="298" fill="#8b949e" font-size="9.5" text-anchor="middle">Pi-hole / BIND9</text>
  <text x="140" y="311" fill="#8b949e" font-size="9.5" text-anchor="middle">110.101 · VLAN 110</text>

