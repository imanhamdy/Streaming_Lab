  <rect x="196" y="390" width="112" height="48" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="252" y="409" fill="#e6edf3" font-size="10.5" font-weight="bold" text-anchor="middle">Jellyfin</text>
  <text x="252" y="424" fill="#8b949e" font-size="9" text-anchor="middle">Stream · Transcode</text>

  <rect x="318" y="390" width="112" height="48" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="374" y="409" fill="#e6edf3" font-size="10.5" font-weight="bold" text-anchor="middle">Keycloak</text>
  <text x="374" y="424" fill="#8b949e" font-size="9" text-anchor="middle">IAM · SSO · MFA</text>

  <rect x="440" y="390" width="112" height="48" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="496" y="409" fill="#e6edf3" font-size="10.5" font-weight="bold" text-anchor="middle">Vault</text>
