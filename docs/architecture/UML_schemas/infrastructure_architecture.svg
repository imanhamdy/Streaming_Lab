  <text x="90" y="398" fill="#3fb950" font-size="10" font-weight="bold">streaming-public (bridge) — Internet via Cloudflare Tunnel → Traefik</text>

  <rect x="70" y="406" width="96" height="46" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="118" y="424" fill="#e6edf3" font-size="9.5" font-weight="bold" text-anchor="middle">Traefik v3.3</text>
  <text x="118" y="438" fill="#8b949e" font-size="8.5" text-anchor="middle">Proxy · :80</text>

