<svg viewBox="0 0 900 1080" xmlns="http://www.w3.org/2000/svg" role="img" font-family="monospace, sans-serif">
  <title>Streaming Lab — Architecture d'Infrastructure (v2.0)</title>
  <desc>Architecture déployée : FortiGate HA, HP Switch, Proxmox VE 8, vm-streaming (20 containers, 3 réseaux Docker), vm-backup Veeam</desc>

  <rect width="900" height="1080" fill="#0d1117"/>

  <!-- Header -->
  <text x="30" y="26" fill="#8b949e" font-size="10">Ynov Campus B3 INFRA · Juillet 2026</text>
  <text x="450" y="26" fill="#e6edf3" font-size="13" font-weight="bold" text-anchor="middle">Streaming Lab — Architecture d'Infrastructure v2.0</text>
  <text x="870" y="26" fill="#3fb950" font-size="10" text-anchor="end">✅ Déployé</text>

  <!-- INTERNET -->
  <rect x="200" y="42" width="500" height="44" rx="6" fill="#21262d" stroke="#444c56" stroke-width="1.5"/>
  <text x="450" y="60" fill="#e6edf3" font-size="12" font-weight="bold" text-anchor="middle">Internet / Utilisateurs</text>
  <text x="450" y="76" fill="#8b949e" font-size="10" text-anchor="middle">Cloudflare Tunnel (sortant) · DNS · TLS 1.3</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444c56"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#238636"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d29922"/>
    </marker>
  </defs>

  <line x1="450" y1="86" x2="450" y2="100" stroke="#444c56" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FORTIGATE HA -->
  <rect x="140" y="100" width="620" height="46" rx="6" fill="#2d1f1f" stroke="#f85149" stroke-width="1.5"/>
  <text x="450" y="120" fill="#f85149" font-size="12" font-weight="bold" text-anchor="middle">FortiGate 60F · HA actif/passif · VIP 192.168.1.20</text>
  <text x="450" y="136" fill="#8b949e" font-size="10" text-anchor="middle">Firewall · ACLs inter-VLAN · VPN SSL FortiClient (MFA) · AP Cisco 2802 WPA3-Enterprise</text>
  <text x="450" y="155" fill="#6e7681" font-size="9" text-anchor="middle">⚠ Tunnel Cloudflare initié en sortie — aucun port entrant ouvert</text>

  <line x1="450" y1="162" x2="450" y2="176" stroke="#444c56" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- HP SWITCH -->
  <rect x="80" y="176" width="740" height="44" rx="6" fill="#1a2535" stroke="#388bfd" stroke-width="1.5"/>
  <text x="450" y="196" fill="#58a6ff" font-size="12" font-weight="bold" text-anchor="middle">HP Switch (SW-01) — 192.168.90.10</text>
  <text x="450" y="212" fill="#8b949e" font-size="10" text-anchor="middle">Trunk 802.1Q · VLAN 10 (Services) · VLAN 20 (DNS) · VLAN 30 (Backup) · VLAN 90 (Management)</text>

  <line x1="450" y1="220" x2="450" y2="234" stroke="#444c56" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PROXMOX OUTER BOX -->
  <rect x="30" y="234" width="840" height="794" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="450" y="256" fill="#e6edf3" font-size="12" font-weight="bold" text-anchor="middle">Proxmox VE 8 — Dell T140 (PROX-01) — 192.168.90.50 — VLAN 90</text>

  <!-- DNS-01 physical note -->
  <rect x="46" y="268" width="190" height="52" rx="6" fill="#1c2128" stroke="#6e7681" stroke-width="1"/>
  <text x="141" y="287" fill="#8b949e" font-size="10" font-weight="bold" text-anchor="middle">DNS-01 (physique)</text>
  <text x="141" y="301" fill="#6e7681" font-size="9" text-anchor="middle">Raspberry Pi 3B+</text>
  <text x="141" y="314" fill="#6e7681" font-size="9" text-anchor="middle">192.168.20.20 · VLAN 20</text>

  <!-- vm-backup -->
  <rect x="664" y="268" width="190" height="52" rx="6" fill="#2b1f0a" stroke="#d29922" stroke-width="1"/>
  <text x="759" y="287" fill="#d29922" font-size="10" font-weight="bold" text-anchor="middle">vm-backup</text>
  <text x="759" y="301" fill="#8b949e" font-size="9" text-anchor="middle">Veeam Repository</text>
  <text x="759" y="314" fill="#8b949e" font-size="9" text-anchor="middle">192.168.30.2 · VLAN 30</text>

  <!-- Veeam arrow -->
  <line x1="620" y1="600" x2="664" y2="310" stroke="#d29922" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-o)"/>
  <text x="656" y="470" fill="#d29922" font-size="8" text-anchor="end" transform="rotate(-70,656,470)">Veeam Worker AES-256</text>

  <!-- VM-STREAMING BOX -->
  <rect x="46" y="338" width="620" height="672" rx="8" fill="#0d1521" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="356" y="358" fill="#58a6ff" font-size="11" font-weight="bold" text-anchor="middle">vm-streaming — 192.168.10.2 — VLAN 10 — Ubuntu 24.04 — Docker Engine</text>
  <text x="356" y="372" fill="#6e7681" font-size="9" text-anchor="middle">20 conteneurs · 3 réseaux Docker</text>

