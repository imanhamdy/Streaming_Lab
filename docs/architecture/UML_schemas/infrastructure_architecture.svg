  <rect x="70" y="460" width="96" height="46" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="118" y="478" fill="#e6edf3" font-size="9.5" font-weight="bold" text-anchor="middle">TrivyHub</text>
  <text x="118" y="492" fill="#8b949e" font-size="8.5" text-anchor="middle">CVE Scan</text>

  <rect x="176" y="460" width="96" height="46" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="224" y="478" fill="#e6edf3" font-size="9.5" font-weight="bold" text-anchor="middle">CrowdSec</text>
  <text x="224" y="492" fill="#8b949e" font-size="8.5" text-anchor="middle">IDS · 6 collections</text>

  <rect x="282" y="460" width="96" height="46" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
