  <rect x="494" y="406" width="96" height="46" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="542" y="424" fill="#e6edf3" font-size="9.5" font-weight="bold" text-anchor="middle">Vault 1.17</text>
