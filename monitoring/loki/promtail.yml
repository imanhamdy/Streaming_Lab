server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  - job_name: syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          host: vm-principal
          role: streaming
          __path__: /var/log/syslog

  - job_name: auth
    static_configs:
      - targets: [localhost]
        labels:
          job: auth
          host: vm-principal
          __path__: /var/log/auth.log

  - job_name: suricata
    static_configs:
      - targets: [localhost]
        labels:
          job: suricata
          host: vm-principal
          __path__: /var/log/suricata/fast.log

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
    pipeline_stages:
      - docker: {}
