global:
  smtp_smarthost: "${SMTP_HOST}"
  smtp_from: "${SMTP_FROM}"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true
  resolve_timeout: 5m

route:
  receiver: email
  group_by: [alertname, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: email
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: email
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true
        headers:
          Subject: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} — {{ .GroupLabels.instance }}"

inhibit_rules:
  - source_match:
      alertname: InstanceDown
    target_match_re:
      alertname: HighCPU|CriticalCPU|HighMemory|CriticalMemory|DiskWarning|DiskCritical
    equal: [instance]
